name: Continuous Integration

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  cancel_in_progress: true
  group: ${{ workflow.filename }}-${{ github.ref }}

defaults:
  tools:
    node: "22"
    pnpm: "10.25.0"

jobs:
  checks:
    name: Lint, typecheck, and test
    type: custom
    runs_on: linux-medium
    if: ${{ github.event_name == 'workflow_dispatch' || contains('OWNER,MEMBER,COLLABORATOR', github.event.pull_request.author_association) }}
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Run lint and typecheck
        run: pnpm check
      - name: Run tests
        run: pnpm test

  main_checks:
    name: Main branch gates
    type: custom
    runs_on: linux-medium
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
    outputs:
      ota_safe: ${{ steps.ota_guard.outputs.ota_safe }}
      ota_reason: ${{ steps.ota_guard.outputs.ota_reason }}
      ota_changed_files: ${{ steps.ota_guard.outputs.ota_changed_files }}
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Run lint and typecheck
        run: pnpm check
      - name: Run tests
        run: pnpm test
      - name: Verify Expo export
        run: pnpm exec expo export --platform all --output-dir dist
      - id: ota_guard
        name: Check OTA safety
        run: |
          before_sha="${{ github.event.before }}"
          current_sha="${{ github.sha }}"

          if [ -n "$before_sha" ] && [ "$before_sha" != "0000000000000000000000000000000000000000" ]; then
            git fetch --depth=1 origin "$before_sha" || true
          fi

          if [ -n "$before_sha" ] && git cat-file -e "$before_sha^{commit}" 2>/dev/null; then
            changed_files="$(git diff --name-only "$before_sha" "$current_sha")"
          else
            echo "Previous commit is unavailable in checkout. Treating update as not OTA-safe."
            changed_files="app.config.ts"
            ota_reason="Previous commit was unavailable in the EAS checkout, so OTA was skipped safely."
          fi

          printf '%s\n' "$changed_files"
          changed_files_csv="$(printf '%s\n' "$changed_files" | awk 'NF { if (out != "") out = out ", "; out = out $0 } END { print out }')"
          set-output ota_changed_files "$changed_files_csv"

          if printf '%s\n' "$changed_files" | grep -E '^(app\.config\..*|app\.json|eas\.json|package\.json|pnpm-lock\.yaml|android/|ios/|plugins/|assets/.*(icon|splash|logo)|src/lib/runtime-config\.ts)' >/dev/null; then
            echo "Native or runtime-sensitive files changed. Skipping automatic OTA update."
            set-output ota_safe false
            set-output ota_reason "${ota_reason:-Native or runtime-sensitive files changed, so a new binary build is required.}"
          else
            set-output ota_safe true
            set-output ota_reason "Only OTA-safe files changed."
          fi

  deploy_convex:
    name: Deploy Convex
    type: custom
    runs_on: linux-medium
    needs:
      - main_checks
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Deploy Convex
        run: pnpm convex deploy --typecheck enable

  send_updates:
    name: Send updates
    type: custom
    runs_on: linux-medium
    needs:
      - main_checks
      - deploy_convex
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' && needs.main_checks.outputs.ota_safe == 'true' }}
    environment: production
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Send production OTA rollout
        run: |
          pnpm dlx eas-cli@18.11.0 update \
            --branch production \
            --environment production \
            --platform all \
            --message "Production OTA from ${{ github.sha }}" \
            --non-interactive

  ota_skipped:
    name: OTA update skipped
    type: doc
    needs:
      - main_checks
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' && needs.main_checks.outputs.ota_safe != 'true' }}
    params:
      md: |
        ## OTA update skipped

        The production OTA update was not sent.

        **Reason:** ${{ needs.main_checks.outputs.ota_reason }}

        **Changed files:** ${{ needs.main_checks.outputs.ota_changed_files }}

        This protects users from receiving JavaScript that may require a new App Store or Play Store binary.
