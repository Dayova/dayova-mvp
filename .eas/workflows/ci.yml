name: Continuous Integration

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  cancel_in_progress: true
  group: ${{ workflow.filename }}-${{ github.ref }}

defaults:
  tools:
    node: "24.18.0"
    pnpm: "10.25.0"

jobs:
  checks:
    name: Lint, typecheck, and test
    type: custom
    runs_on: linux-medium
    if: ${{ github.event_name == 'workflow_dispatch' || contains('OWNER,MEMBER,COLLABORATOR', github.event.pull_request.author_association) }}
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Run lint and typecheck
        run: pnpm check
      - name: Run tests
        run: pnpm test

  main_checks:
    name: Main branch gates
    type: custom
    runs_on: linux-medium
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
    outputs:
      ota_safe: ${{ steps.ota_guard.outputs.ota_safe }}
      ota_reason: ${{ steps.ota_guard.outputs.ota_reason }}
      ota_baseline: ${{ steps.ota_guard.outputs.ota_baseline }}
      ota_current_fingerprints: ${{ steps.ota_guard.outputs.ota_current_fingerprints }}
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Run lint and typecheck
        run: pnpm check
      - name: Run tests
        run: pnpm test
      - name: Verify Expo export
        env:
          APP_VARIANT: production
        run: pnpm exec expo export --platform all --output-dir dist
      - id: ota_guard
        name: Check OTA safety against distributed binaries
        env:
          APP_VARIANT: production
        run: |
          if ota_report="$(node scripts/ota-safety.mjs --json)"; then
            ota_safe=true
          else
            ota_safe=false
          fi

          printf '%s\n' "$ota_report"
          ota_reason="$(OTA_REPORT="$ota_report" node -p 'JSON.parse(process.env.OTA_REPORT).reason')"
          ota_baseline="$(OTA_REPORT="$ota_report" node -p 'JSON.parse(process.env.OTA_REPORT).baseline')"
          ota_current_fingerprints="$(OTA_REPORT="$ota_report" node -p 'JSON.parse(process.env.OTA_REPORT).currentFingerprints')"

          set-output ota_safe "$ota_safe"
          set-output ota_reason "$ota_reason"
          set-output ota_baseline "$ota_baseline"
          set-output ota_current_fingerprints "$ota_current_fingerprints"

  deploy_convex:
    name: Deploy Convex
    type: custom
    runs_on: linux-medium
    needs:
      - main_checks
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Deploy Convex
        run: pnpm convex deploy --typecheck enable

  send_updates:
    name: Send updates
    type: custom
    runs_on: linux-medium
    needs:
      - main_checks
      - deploy_convex
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' && needs.main_checks.outputs.ota_safe == 'true' }}
    environment: production
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Verify production manifest and distributed-binary compatibility
        env:
          APP_VARIANT: production
        run: node scripts/ota-safety.mjs
      - name: Send production OTA rollout
        env:
          APP_VARIANT: production
        run: |
          pnpm dlx eas-cli@18.11.0 update \
            --branch production \
            --environment production \
            --platform all \
            --message "Production OTA from ${{ github.sha }}" \
            --non-interactive

  ota_skipped:
    name: OTA update skipped
    type: doc
    needs:
      - main_checks
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' && needs.main_checks.outputs.ota_safe != 'true' }}
    params:
      md: |
        ## OTA update skipped

        The production OTA update was not sent.

        **Reason:** ${{ needs.main_checks.outputs.ota_reason }}

        **Distributed baseline:** ${{ needs.main_checks.outputs.ota_baseline }}

        **Current fingerprints:** ${{ needs.main_checks.outputs.ota_current_fingerprints }}

        This block persists across later commits until the production manifest and native fingerprints match verified distributed binaries.
