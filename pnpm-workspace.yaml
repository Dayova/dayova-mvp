autoInstallPeers: false
pmOnFail: error
# Leave enough path budget for CMake/Ninja in deep Windows worktrees.
virtualStoreDirMaxLength: 40

allowBuilds:
  browser-tabs-lock: false
  core-js: false
  esbuild: true
  tesseract.js: false

patchedDependencies:
  '@expo/metro-config@57.0.7': patches/@expo__metro-config@57.0.7.patch
  '@react-native/gradle-plugin@0.86.0': patches/@react-native__gradle-plugin@0.86.0.patch
  nativewind@4.2.3: patches/nativewind@4.2.3.patch
  oxc-parser@0.130.0: patches/oxc-parser@0.130.0.patch
  react-native-keyboard-controller@1.21.9: patches/react-native-keyboard-controller@1.21.9.patch

minimumReleaseAgeExclude:
  - '@expo/cli@57.0.10'
  - '@expo/config-plugins@57.0.6'
  - '@expo/config@57.0.6'
  - '@expo/fingerprint@0.20.6'
  - '@expo/image-utils@0.11.4'
  - '@expo/metro-config@57.0.7'
  - '@expo/metro-runtime@57.0.7'
  - '@expo/prebuild-config@57.0.9'
  - '@expo/require-utils@57.0.4'
  - '@expo/router-server@57.0.4'
  - babel-preset-expo@57.0.4
  - expo-asset@57.0.7
  - expo-constants@57.0.7
  - expo-dev-client@57.0.8
  - expo-dev-launcher@57.0.8
  - expo-dev-menu@57.0.8
  - expo-image-picker@57.0.6
  - expo-linking@57.0.4
  - expo-modules-autolinking@57.0.9
  - expo-modules-core@57.0.7
  - expo-modules-jsi@57.0.4
  - expo-notifications@57.0.7
  - expo-router@57.0.8
  - expo-splash-screen@57.0.5
  - expo-updates@57.0.9
  - expo@57.0.8
