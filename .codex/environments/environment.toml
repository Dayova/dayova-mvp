# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "dayova-mvp"

[setup]
script = '''
node -e "
const fs = require('fs');
const path = require('path');
const { spawnSync } = require('child_process');

const source = process.env.CODEX_SOURCE_TREE_PATH;
const worktree = process.env.CODEX_WORKTREE_PATH;

if (!source || !worktree) {
  throw new Error(
    'Missing CODEX_SOURCE_TREE_PATH or CODEX_WORKTREE_PATH'
  );
}

const isWindows = process.platform === 'win32';

function run(command, args, options = {}) {
  const result = spawnSync(command, args, {
    cwd: worktree,
    stdio: 'inherit',
    shell: isWindows,
    ...options,
  });

  if (result.error) {
    console.error(
      'Failed to execute ' + command + ':',
      result.error.message
    );
  }

  return result;
}

function runCaptured(command, args) {
  const result = spawnSync(command, args, {
    cwd: worktree,
    stdio: ['ignore', 'pipe', 'inherit'],
    encoding: 'utf8',
    shell: isWindows,
  });

  if (result.error) {
    throw new Error(
      'Failed to execute ' +
        command +
        ': ' +
        result.error.message
    );
  }

  if (result.status !== 0) {
    process.exit(result.status ?? 1);
  }

  const lines = (result.stdout || '')
    .trim()
    .split(/\r?\n/)
    .filter(Boolean);

  const value = lines.at(-1);

  if (!value) {
    throw new Error(
      command + ' did not produce the expected output'
    );
  }

  return value;
}

function commandExists(command) {
  const result = spawnSync(command, ['--version'], {
    cwd: worktree,
    stdio: 'ignore',
    shell: isWindows,
  });

  return !result.error && result.status === 0;
}

function readTextFile(filename) {
  const filePath = path.join(worktree, filename);

  if (!fs.existsSync(filePath)) {
    return null;
  }

  const value = fs
    .readFileSync(filePath, 'utf8')
    .trim();

  return value || null;
}

function getProjectNodeVersion() {
  const nodeVersion = readTextFile('.node-version');

  if (nodeVersion) {
    return {
      version: nodeVersion,
      source: '.node-version',
    };
  }

  const nvmrcVersion = readTextFile('.nvmrc');

  if (nvmrcVersion) {
    return {
      version: nvmrcVersion,
      source: '.nvmrc',
    };
  }

  const packageJsonPath = path.join(
    worktree,
    'package.json'
  );

  if (fs.existsSync(packageJsonPath)) {
    const packageJson = JSON.parse(
      fs.readFileSync(packageJsonPath, 'utf8')
    );

    const engineVersion =
      packageJson.engines &&
      packageJson.engines.node;

    if (engineVersion) {
      return {
        version: engineVersion,
        source: 'package.json engines.node',
      };
    }
  }

  return null;
}

function nearestExistingPath(candidate) {
  let current = path.resolve(candidate);

  while (!fs.existsSync(current)) {
    const parent = path.dirname(current);

    if (parent === current) {
      throw new Error(
        'Could not resolve filesystem for ' +
          candidate
      );
    }

    current = parent;
  }

  return fs.realpathSync.native(current);
}

function filesystemId(candidate) {
  const resolved = nearestExistingPath(candidate);

  if (isWindows) {
    return path
      .parse(resolved)
      .root
      .toLowerCase();
  }

  return fs.statSync(resolved).dev;
}

// Copy the local environment file.
const envSource = path.join(
  source,
  '.env.local'
);

const envDestination = path.join(
  worktree,
  '.env.local'
);

if (fs.existsSync(envSource)) {
  fs.copyFileSync(
    envSource,
    envDestination
  );

  console.log(
    'Copied .env.local into the worktree'
  );
} else {
  console.warn(
    'Missing ' +
      envSource +
      '; skipping .env.local copy'
  );
}

const corepackCommand = isWindows
  ? 'corepack.cmd'
  : 'corepack';

const projectNode = getProjectNodeVersion();
const hasFnm = commandExists('fnm');
const useFnm = hasFnm && Boolean(projectNode);

if (useFnm) {
  console.log(
    'Using Node.js ' +
      projectNode.version +
      ' from ' +
      projectNode.source
  );

  const installResult = run('fnm', [
    'install',
    projectNode.version,
  ]);

  if (installResult.status !== 0) {
    process.exit(
      installResult.status ?? 1
    );
  }
} else if (!hasFnm) {
  console.warn(
    'fnm is not installed; using the currently active Node.js version'
  );
} else {
  console.warn(
    'No .node-version, .nvmrc, or package.json engines.node found; ' +
      'using the currently active Node.js version'
  );
}

function getPnpmInvocation(args) {
  if (useFnm) {
    return {
      command: 'fnm',
      args: [
        'exec',
        '--using',
        projectNode.version,
        '--',
        corepackCommand,
        'pnpm',
        ...args,
      ],
    };
  }

  return {
    command: corepackCommand,
    args: [
      'pnpm',
      ...args,
    ],
  };
}

function runPnpm(args) {
  const invocation =
    getPnpmInvocation(args);

  return run(
    invocation.command,
    invocation.args
  );
}

function capturePnpm(args) {
  const invocation =
    getPnpmInvocation(args);

  return runCaptured(
    invocation.command,
    invocation.args
  );
}

const storePath = capturePnpm([
  'store',
  'path',
]);

const storeFilesystem =
  filesystemId(storePath);

const worktreeFilesystem =
  filesystemId(worktree);

console.log(
  'pnpm store: ' + storePath
);

console.log(
  'Codex worktree: ' + worktree
);

if (
  storeFilesystem !==
  worktreeFilesystem
) {
  throw new Error(
    'pnpm store and Codex worktree are on different filesystems.\n' +
      'Store: ' +
      storePath +
      '\n' +
      'Worktree: ' +
      worktree +
      '\n' +
      'Set Codex Settings > Worktrees > Worktree root to the same drive as the pnpm store.'
  );
}

console.log(
  'pnpm store and worktree share a filesystem; package linking is available'
);

const result = runPnpm([
  'install',
  '--frozen-lockfile',
  '--prefer-offline',
]);

process.exit(result.status ?? 1);
"'''

[[actions]]
name = "Run on ios in dev"
icon = "tool"
command = '''
pnpm i
pnpm ios'''
